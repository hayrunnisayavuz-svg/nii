 {id:18,name:"Xanax 0.25 mg Tablet",pack:"50 tb",active:"Alprazolam",atc:"N05BA12",stock:2,thr:5,w:{selcuk:{name:"Selçuk Ecza Deposu",p:34.50,ok:true,d:1},hedef:{name:"Hedef Alliance Ecza",p:33.20,ok:true,d:1},sancak:{name:"Sancak Ecza Deposu",p:35.80,ok:true,d:2}}},
 {id:19,name:"Aprovel 150 mg Film Tablet",pack:"28 tb",active:"İrbesartan",atc:"C09CA04",stock:16,thr:8,w:{selcuk:{name:"Selçuk Ecza Deposu",p:87.30,ok:true,d:1},hedef:{name:"Hedef Alliance Ecza",p:83.60,ok:true,d:2},sancak:{name:"Sancak Ecza Deposu",p:89.10,ok:true,d:1}}},
 {id:20,name:"Proksafen 50 mg Kapsül",pack:"20 kps",active:"Tramadol HCl",atc:"N02AX02",stock:4,thr:6,w:{selcuk:{name:"Selçuk Ecza Deposu",p:48.90,ok:true,d:1},hedef:{name:"Hedef Alliance Ecza",p:46.50,ok:false,d:4},sancak:{name:"Sancak Ecza Deposu",p:50.20,ok:true,d:2}}}
];

let products=[...FALLBACK_DRUGS];
let source="Yedek veri";
let cart={};
let activeTab="dashboard";
let messages=[{role:"ai",text:"Merhaba! Stok durumu, fiyat karşılaştırması ve sipariş önerileri için buradayım."}];
let geminiKey=CONFIG.GEMINI_API_KEY || "";

function money(v){return Number(v||0).toFixed(2).replace('.',',')+' ₺'}
function statusOf(d){if(Number(d.stock)===0)return 'empty'; if(Number(d.stock)/Number(d.thr)<0.35)return 'critical'; if(Number(d.stock)<Number(d.thr))return 'low'; return 'ok'}
function badge(st){return st==='ok'?'<span class="status ok">✓ Normal</span>':st==='low'?'<span class="status low">⚠ Düşük</span>':'<span class="status crit">▼ Kritik</span>'}
function bestWh(d){return Object.entries(d.w||{}).filter(([k,w])=>w.ok===true||w.ok==='TRUE'||w.ok==='true').sort((a,b)=>Number(a[1].p)-Number(b[1].p))[0]?.[0]||null}
function criticalList(){return products.filter(d=>statusOf(d)!=='ok')}
function normalizeRows(data){
  if(Array.isArray(data.products)) return data.products;
  if(Array.isArray(data)) return data;
  return [];
}
async function loadProducts(){
  if(!CONFIG.N8N_GET_PRODUCTS_WEBHOOK_URL){renderAll();return;}
  try{
    const res=await fetch(CONFIG.N8N_GET_PRODUCTS_WEBHOOK_URL);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rows=normalizeRows(data);
    if(rows.length){products=rows;source='Google Sheets';}
  }catch(e){source='Yedek veri - n8n bağlantısı alınamadı'; console.warn(e);}
  renderAll();
}
async function postJSON(url,payload){
  if(!url) return {ok:false,empty:true};
  try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});return {ok:r.ok,status:r.status};}
  catch(e){return {ok:false,error:e.message};}
}
function setTab(t){activeTab=t;document.querySelectorAll('.nav').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));document.getElementById(t).classList.remove('hidden');renderAll();}
document.querySelectorAll('.nav').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

function renderDashboard(){
 const c=criticalList();
 document.getElementById('topBadge').textContent=`⚠ ${c.length} Kritik Ürün`;
 const ok=products.filter(d=>statusOf(d)==='ok').length, empty=products.filter(d=>Number(d.stock)===0).length;
 document.getElementById('dashboard').innerHTML=`<div class="head"><div><div class="title">Stok Genel Bakış</div><div class="sub">Veri kaynağı: <b>${source}</b></div></div><button class="btn btn-outline" onclick="loadProducts()">↻ Sheets'ten Yenile</button></div><div class="grid"><div class="kpi"><small>Toplam Ürün</small><b>${products.length}</b></div><div class="kpi"><small>Stok Yok</small><b style="color:#ef4444">${empty}</b></div><div class="kpi"><small>Kritik / Düşük</small><b style="color:#f59e0b">${c.length}</b></div><div class="kpi"><small>Normal Stok</small><b style="color:#10b981">${ok}</b></div></div><input id="search" class="search" placeholder="İlaç adı veya etkin madde ara..." oninput="renderProductTable(this.value)"><div id="productTable"></div>`;
 renderProductTable('');
}
function renderProductTable(q=''){
 const list=products.filter(d=>(d.name+' '+d.active).toLowerCase().includes(q.toLowerCase()));
 document.getElementById('productTable').innerHTML=`<table><thead><tr><th>İlaç</th><th>Etkin Madde</th><th>Stok / Eşik</th><th>Durum</th><th>En Düşük Fiyat</th><th></th></tr></thead><tbody>${list.map(d=>{const st=statusOf(d), bw=bestWh(d);const pct=Math.min(100,Math.round(Number(d.stock)/Math.max(Number(d.thr)*1.5,1)*100));return `<tr><td><b>${d.name}</b><div class="sub">${d.pack||''} · ${d.atc||''}</div></td><td>${d.active||''}</td><td><div class="row"><b>${d.stock}</b><div><div class="bar"><div class="fill ${st==='ok'?'':st==='low'?'lowbar':'critbar'}" style="width:${pct}%"></div></div><div class="sub">/${d.thr}</div></div></div></td><td>${badge(st)}</td><td>${bw?money(d.w[bw].p)+' ('+(d.w[bw].name||bw)+')':'Yok'}</td><td>${st!=='ok'&&bw?`<button class="btn btn-green" onclick="addCart(${d.id},'${bw}')">Sipariş</button>`:''}</td></tr>`}).join('')}</tbody></table>`;
}
function renderCritical(){
 const c=criticalList();
 document.getElementById('critical').innerHTML=`<div class="head"><div><div class="title">Kritik Stok — Depo Fiyat Karşılaştırması</div><div class="sub">Google Sheets'ten gelen stok ve depo fiyatlarına göre hesaplanır. Veri kaynağı: <b>${source}</b></div></div><button class="btn btn-green" onclick="setTab('order')">Sepete Git (${Object.keys(cart).length})</button></div>${c.length?c.map(d=>{const bw=bestWh(d);return `<div class="card"><div class="head"><div><b>${d.name}</b><div class="sub">${d.active||''} · Stok: ${d.stock} / Eşik: ${d.thr}</div></div>${badge(statusOf(d))}</div>${Object.entries(d.w||{}).map(([wid,w])=>`<div class="price-row ${wid===bw?'best':''}"><b>${w.name||wid}</b><span>${money(w.p)}</span><span>${w.ok?'Stok var':'Stok yok'}</span><button class="btn ${w.ok?'btn-green':'btn-outline'}" ${w.ok?'':'disabled'} onclick="addCart(${d.id},'${wid}')">${wid===bw?'EN UCUZ · ':''}Ekle</button></div>`).join('')}</div>`}).join(''):`<div class="card">Kritik stok yok.</div>`}`;
}
function addCart(id,wh){cart[id]=cart[id]&&cart[id].wh===wh?{wh,qty:cart[id].qty+1}:{wh,qty:1};setTab('order');}
function updateQty(id,delta){if(!cart[id])return;cart[id].qty+=delta;if(cart[id].qty<=0)delete cart[id];renderOrder();}
function removeCart(id){delete cart[id];renderOrder();}
function cartItems(){return Object.entries(cart).map(([id,v])=>({drug:products.find(d=>String(d.id)===String(id)),wh:v.wh,qty:v.qty})).filter(x=>x.drug)}
function renderOrder(){
 const items=cartItems();const total=items.reduce((s,i)=>s+Number(i.drug.w[i.wh].p)*i.qty,0);
 document.getElementById('order').innerHTML=`<div class="head"><div><div class="title">Sipariş Oluştur</div><div class="sub">${items.length} ürün · Toplam ${money(total)}</div></div></div>${items.length?`<div class="card">${items.map(i=>`<div class="cart-item"><div><b>${i.drug.name}</b><div class="sub">${i.drug.w[i.wh].name} · ${money(i.drug.w[i.wh].p)}/kutu</div></div><div class="qty"><button onclick="updateQty(${i.drug.id},-1)">−</button><span>${i.qty}</span><button onclick="updateQty(${i.drug.id},1)">+</button></div><b>${money(Number(i.drug.w[i.wh].p)*i.qty)}</b><button class="btn btn-red" onclick="removeCart(${i.drug.id})">×</button></div>`).join('')}</div><div class="card"><div class="head"><b>Toplam Tutar</b><b style="font-size:24px;color:#10b981">${money(total)}</b></div><button class="btn btn-green" style="width:100%;padding:13px" onclick="confirmOrder()">✓ Siparişleri Onayla ve Sheets'e Kaydet</button></div>`:`<div class="card" style="text-align:center;padding:50px"><h2>🛒 Sepet boş</h2><br><button class="btn btn-green" onclick="setTab('critical')">Kritik Stoka Dön</button></div>`}`;
}
async function confirmOrder(){
 const items=cartItems();const orderId='ORD-'+Date.now();
 const payload={order_id:orderId,order_date:new Date().toISOString(),items:items.map(i=>({warehouse_name:i.drug.w[i.wh].name,product_id:i.drug.id,product_name:i.drug.name,quantity:i.qty,unit_price:Number(i.drug.w[i.wh].p),total_price:Number(i.drug.w[i.wh].p)*i.qty,status:'Created'}))};
 const result=await postJSON(CONFIG.N8N_ORDER_WEBHOOK_URL,payload);
 const msg=result.ok?'Siparişler n8n üzerinden Google Sheets Orders sayfasına gönderildi.':'Sipariş ekranda onaylandı ama n8n Order Webhook URL boş veya bağlantı başarısız.';
 document.body.insertAdjacentHTML('beforeend',`<div class="modal" onclick="this.remove();cart={};setTab('dashboard')"><div class="modal-box" onclick="event.stopPropagation()"><h1>✅</h1><h2>Sipariş Oluşturuldu</h2><p class="sub" style="margin:12px 0">${msg}</p><button class="btn btn-green" onclick="this.closest('.modal').remove();cart={};setTab('dashboard')">Tamam</button></div></div>`);
}
function renderAI(){
 document.getElementById('ai').innerHTML=`<div class="head"><div><div class="title">AI Asistan</div><div class="sub">Gemini API + AI_Logs Google Sheets kaydı</div></div></div><div class="note">Gemini API key'i public GitHub'a yazma. Demoda bu alana ekrandan girmen daha güvenli.</div><div class="card"><div class="row"><b>Gemini API:</b><input class="api-input" type="password" placeholder="AIzaSy..." value="${geminiKey}" oninput="geminiKey=this.value"></div><div class="quick"><button onclick="askAI('Hangi ürünleri acil sipariş etmeliyim?')">Acil sipariş öner</button><button onclick="askAI('En ucuz depoyu öner')">En ucuz depo</button><button onclick="askAI('Bugünkü stok özetini ver')">Stok özeti</button></div><div class="chat"><div id="msgs" class="messages">${messages.map(m=>`<div class="msg ${m.role==='user'?'user':'ai'}">${m.text}</div>`).join('')}</div><div class="chatbar"><input id="aiInput" placeholder="Stok, fiyat veya sipariş önerisi sor..." onkeydown="if(event.key==='Enter')askAI(this.value)"><button class="btn btn-green" onclick="askAI(document.getElementById('aiInput').value)">Gönder</button></div></div></div>`;
}
async function askAI(text){
 if(!text.trim())return;messages.push({role:'user',text});messages.push({role:'ai',text:'Düşünüyor...'});renderAI();
 const ctx=`Sen Türkçe konuşan EczanePanel AI asistanısın. Kısa ve net cevap ver. Kritik stoklar: ${criticalList().map(d=>d.name+' stok:'+d.stock+' eşik:'+d.thr).join('; ')}. Kullanıcı sorusu: ${text}`;
 let answer='';
 if(!geminiKey){answer='Gemini API key girilmedi. API key alanını doldurmalısın.';}
 else{
   try{const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:ctx}]}]})});const d=await r.json();answer=d.candidates?.[0]?.content?.parts?.[0]?.text||('Yanıt alınamadı: '+(d.error?.message||'Bilinmeyen hata'));}
   catch(e){answer='Bağlantı hatası: '+e.message;}
 }
 messages[messages.length-1]={role:'ai',text:answer};
 postJSON(CONFIG.N8N_AI_LOG_WEBHOOK_URL,{date:new Date().toISOString(),user_question:text,ai_answer:answer,related_module:'AI Asistan'});
 renderAI();
}
function renderAll(){if(activeTab==='dashboard')renderDashboard(); if(activeTab==='critical')renderCritical(); if(activeTab==='order')renderOrder(); if(activeTab==='ai')renderAI();}
loadProducts();
</script>
